<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;display=swap');
    </style>
    <clipPath id="clip-top">
      <rect x="0" y="0" width="500" height="250"/>
    </clipPath>
    <clipPath id="clip-bottom">
      <rect x="0" y="250" width="500" height="250"/>
    </clipPath>
  </defs>

  <!-- Top half: ink -->
  <rect x="0" y="0" width="500" height="250" fill="#1c1a17"/>
  <!-- Bottom half: stone -->
  <rect x="0" y="250" width="500" height="250" fill="#f5f2ee"/>

  <!-- Wordmark clipped to top half — warm white -->
  <text
    x="250"
    y="266"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="72"
    font-weight="400"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#faf8f5"
    clip-path="url(#clip-top)">haylo.</text>

  <!-- Same wordmark clipped to bottom half — clay -->
  <text
    x="250"
    y="266"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="72"
    font-weight="400"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#b8967a"
    clip-path="url(#clip-bottom)">haylo.</text>
</svg>
